name: Context Drift
description: Detect when changed source files drift from repository conventions.

inputs:
  base-ref:
    description: Git ref to compare changed files against.
    required: false
    default: origin/main
  min-confidence:
    description: Minimum finding confidence from 0 to 1.
    required: false
    default: "0.75"
  format:
    description: Output format, markdown or json.
    required: false
    default: markdown

runs:
  using: composite
  steps:
    - name: Install action dependencies
      shell: bash
      run: npm ci
      working-directory: ${{ github.action_path }}

    - name: Build action CLI
      shell: bash
      run: npm run build
      working-directory: ${{ github.action_path }}

    - name: Run Context Drift
      shell: bash
      run: |
        node "$GITHUB_ACTION_PATH/dist/index.js" check \
          --base "${{ inputs.base-ref }}" \
          --format "${{ inputs.format }}" \
          --min-confidence "${{ inputs.min-confidence }}"
      working-directory: ${{ github.workspace }}
